on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

name: run-tests.yaml

jobs:
  run-tests:
    name: Run testthat tests
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::testthat
            any::devtools
            any::shiny
            any::shinydashboard
            any::shinyvalidate
            any::ggiraph
            any::shinyFiles
            any::shinycssloaders
            any::shinyjs

      - name: Run tests
        run: |
          pkgload::load_all()
          testthat::test_local(testthat::test_path(), stop_on_failure = TRUE)
        shell: Rscript {0}
